zabbix_export:
  version: '6.0'
  date: '2025-10-29T11:07:43Z'
  groups:
    -
      uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    -
      uuid: be86cefdeee94796a54b1fe34ed81c4a
      template: 'Huawei AC6508 SNMP v3'
      name: 'Huawei AC6508 SNMP v3'
      description: |
        Данный шаблон сделан для Huawei AC6508, в котором имена точек доступа WiFi закодированы в OID в формате ASCII. Он работает через внешний скрипт, который должен лежать на сервере Zabbix (либо на zabbix-proxy, если узел мониторится через прокси сервер).
        
        Для работы шаблона в узле должны быть прописаны следующие макросы:
        
        {$IP_ADDR} - ip адрес
        {$SNMP_COMM} - community, который настроен на сервере
        {$OID} - OID, через который скрипт будет получать список имен точек доступа и конвертировать их в читаемые имена.
        {$NAME} - имя пользователя SNMPv3, который указан на сервере
        {$LEVEL} - уровень (authPriv)
        {$AUTH_PROTO} - протокол аутентификации (например, SHA-256)
        {$ENCYPRO_PROTO} - протокол шифрования (например, AES)
        {$AUTH_PASS} - пароль аутентификации
        {$ENCYPRO_PASS} - пароль шифрования
      templates:
        -
          name: 'Template Module ICMP Ping'
      groups:
        -
          name: 'Templates/Network devices'
      items:
        -
          uuid: ea367aa668c743bb8eb24ab02bc89504
          name: 'CPU Usage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5.9
          key: cpu.usage
          units: '%'
          triggers:
            -
              uuid: 16892d2702074069bba30a3473893119
              expression: 'last(/Huawei AC6508 SNMP v3/cpu.usage)>80'
              name: 'High CPU usage'
              priority: WARNING
        -
          uuid: d800d0eba6184d1e82601949f035435e
          name: 'Memory Usage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7.9
          key: mem.usage
          trends: 90d
          units: '%'
          triggers:
            -
              uuid: 648a6803ba264e51aeefaa0d1101f88f
              expression: 'last(/Huawei AC6508 SNMP v3/mem.usage)>80'
              name: 'High mempry usage'
              priority: WARNING
      discovery_rules:
        -
          uuid: 7db38474db6f4f228929ae69de26452b
          name: 'Discovery Rule for SSID'
          type: EXTERNAL
          key: 'ascii_decod.py["3","{$IP_ADDR}","{$NAME}","{$LEVEL}","{$AUTH_PROTO}","{$ENCYPRO_PROTO}","{$AUTH_PASS}","{$ENCYPRO_PASS}","{$OID}"]'
          delay: 24h
          item_prototypes:
            -
              uuid: 2f28dab6f6e74ee29e34b382c657ca3b
              name: '{#SSID}: Users 2.4G'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.2.{#OIDINDEX}'
              key: 'ssid.2g.users[{#OIDINDEX}]'
              trends: 90d
            -
              uuid: 78a52a892993430692512c363c3f67a4
              name: '{#SSID}: Users 5G'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.3.{#OIDINDEX}'
              key: 'ssid.5g.users[{#OIDINDEX}]'
              trends: 90d
            -
              uuid: 5e88978f9ab74da188855d6c5f46052f
              name: '{#SSID}: RecvBytes'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.5.{#OIDINDEX}'
              key: 'ssid.recv.bytes[{#OIDINDEX}]'
              trends: 90d
              units: B
            -
              uuid: fb61589056d74f0f852ddafb4898afe9
              name: '{#SSID}: RecvFrames'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.7.{#OIDINDEX}'
              key: 'ssid.recv.frames[{#OIDINDEX}]'
              trends: 90d
            -
              uuid: 415ba97aaca24de788c5d66cac33c0a4
              name: '{#SSID}: RecvRate'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.16.{#OIDINDEX}'
              key: 'ssid.recv.rate[{#OIDINDEX}]'
              trends: 90d
              units: Bps
            -
              uuid: a5c5e52f80c34852a6c5f3c06dbad058
              name: '{#SSID}: SendBytes'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.9.{#OIDINDEX}'
              key: 'ssid.send.bytes[{#OIDINDEX}]'
              trends: 90d
              units: B
            -
              uuid: 63f157b6a8a9483098ae17a056b18ead
              name: '{#SSID}: SendFrames'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.10.{#OIDINDEX}'
              key: 'ssid.send.frames[{#OIDINDEX}]'
              trends: 90d
              units: B
            -
              uuid: 7b40d2e087f24407b548783755679d74
              name: '{#SSID}: SendRate'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.139.17.1.2.1.15.{#OIDINDEX}'
              key: 'ssid.send.rate[{#OIDINDEX}]'
              trends: 90d
              units: Bps
          graph_prototypes:
            -
              uuid: 4e97a696c9d1415c80b649d34f1d3154
              name: '{#SSID}: RecvRate stats'
              graph_items:
                -
                  drawtype: BOLD_LINE
                  color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Huawei AC6508 SNMP v3'
                    key: 'ssid.recv.rate[{#OIDINDEX}]'
            -
              uuid: 7fb89315cbe74fcba50cab3e0a734662
              name: '{#SSID}: SendRate stats'
              graph_items:
                -
                  drawtype: BOLD_LINE
                  color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Huawei AC6508 SNMP v3'
                    key: 'ssid.send.rate[{#OIDINDEX}]'
            -
              uuid: 3e7da8ee11174c72b08d148dd718a261
              name: '{#SSID}: Users'
              graph_items:
                -
                  drawtype: BOLD_LINE
                  color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Huawei AC6508 SNMP v3'
                    key: 'ssid.2g.users[{#OIDINDEX}]'
                -
                  sortorder: '1'
                  drawtype: BOLD_LINE
                  color: '274482'
                  calc_fnc: ALL
                  item:
                    host: 'Huawei AC6508 SNMP v3'
                    key: 'ssid.5g.users[{#OIDINDEX}]'
  graphs:
    -
      uuid: fc5ba96e40e6405bad48ad339958ed20
      name: 'CPU Usage stats'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        -
          drawtype: BOLD_LINE
          color: 1A7C11
          calc_fnc: ALL
          item:
            host: 'Huawei AC6508 SNMP v3'
            key: cpu.usage
    -
      uuid: 02ca8d62549b4c4c8282866545a4c2ac
      name: 'Memory Usage stats'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        -
          drawtype: BOLD_LINE
          color: 1A7C11
          calc_fnc: ALL
          item:
            host: 'Huawei AC6508 SNMP v3'
            key: mem.usage
